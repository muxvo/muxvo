name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-mac:
    needs: test
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build and notarize app
        run: npx electron-vite build && npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: dist/

  release:
    needs: build-mac
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-arm64
          path: dist-arm64

      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-x64
          path: dist-x64

      - name: Merge latest-mac.yml
        run: |
          node -e "
          const fs = require('fs');

          const arm64 = fs.readFileSync('dist-arm64/latest-mac.yml', 'utf8');
          const x64 = fs.readFileSync('dist-x64/latest-mac.yml', 'utf8');

          // Parse files entries from yml content
          function parseFiles(content) {
            const files = [];
            let current = null;
            for (const line of content.split('\n')) {
              if (line.startsWith('  - url:')) {
                if (current) files.push(current);
                current = { url: line.replace('  - url: ', '').trim() };
              } else if (current && line.startsWith('    sha512:')) {
                current.sha512 = line.replace('    sha512: ', '').trim();
              } else if (current && line.startsWith('    size:')) {
                current.size = line.replace('    size: ', '').trim();
              }
            }
            if (current) files.push(current);
            return files;
          }

          function getField(content, field) {
            const m = content.match(new RegExp('^' + field + ': (.+)$', 'm'));
            return m ? m[1].trim() : '';
          }

          const version = getField(arm64, 'version');
          const releaseDate = getField(arm64, 'releaseDate');
          const path = getField(arm64, 'path');
          const sha512 = getField(arm64, 'sha512');

          const allFiles = [...parseFiles(arm64), ...parseFiles(x64)];

          let merged = 'version: ' + version + '\n';
          merged += 'files:\n';
          for (const f of allFiles) {
            merged += '  - url: ' + f.url + '\n';
            merged += '    sha512: ' + f.sha512 + '\n';
            merged += '    size: ' + f.size + '\n';
          }
          merged += 'path: ' + path + '\n';
          merged += 'sha512: ' + sha512 + '\n';
          merged += 'releaseDate: ' + releaseDate + '\n';

          fs.writeFileSync('latest-mac.yml', merged);
          console.log('Merged latest-mac.yml:');
          console.log(merged);
          "

      - name: Get version
        id: version
        run: echo "v=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            dist-arm64/Muxvo-${{ steps.version.outputs.v }}-arm64.dmg
            dist-arm64/Muxvo-${{ steps.version.outputs.v }}-arm64.dmg.blockmap
            dist-arm64/Muxvo-${{ steps.version.outputs.v }}-arm64.zip
            dist-arm64/Muxvo-${{ steps.version.outputs.v }}-arm64.zip.blockmap
            dist-x64/Muxvo-${{ steps.version.outputs.v }}-x64.dmg
            dist-x64/Muxvo-${{ steps.version.outputs.v }}-x64.dmg.blockmap
            dist-x64/Muxvo-${{ steps.version.outputs.v }}-x64.zip
            dist-x64/Muxvo-${{ steps.version.outputs.v }}-x64.zip.blockmap
            latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy DMGs to website server
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

          VERSION=$(node -p "require('./package.json').version")

          # Upload both architectures
          scp -i ~/.ssh/deploy_key \
            "dist-arm64/Muxvo-${VERSION}-arm64.dmg" \
            "dist-x64/Muxvo-${VERSION}-x64.dmg" \
            "root@${SERVER_HOST}:/var/www/muxvo-downloads/"

          # Create stable symlinks
          ssh -i ~/.ssh/deploy_key "root@${SERVER_HOST}" \
            "cd /var/www/muxvo-downloads && ln -sf Muxvo-${VERSION}-arm64.dmg Muxvo-arm64.dmg && ln -sf Muxvo-${VERSION}-x64.dmg Muxvo-x64.dmg"
