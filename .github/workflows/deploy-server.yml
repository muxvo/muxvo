name: Deploy Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload code via rsync
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude .env \
            --exclude .git \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ root@${{ secrets.SERVER_HOST }}:/opt/muxvo-server/

      - name: Ensure server .env
        run: |
          cat << EOF | ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_HOST }} "cat > /opt/muxvo-server/server/.env"
          NODE_ENV=production
          PORT=3000
          HOST=0.0.0.0
          DATABASE_URL=postgresql://muxvo:${{ secrets.DB_PASSWORD }}@postgres:5432/muxvo
          REDIS_URL=redis://redis:6379
          JWT_PRIVATE_KEY_PATH=/app/data/jwt-private.pem
          JWT_PUBLIC_KEY_PATH=/app/data/jwt-public.pem
          JWT_KEY_ID=muxvo-auth-key-v1
          GITHUB_CLIENT_ID=${{ secrets.OAUTH_GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET=${{ secrets.OAUTH_GH_CLIENT_SECRET }}
          GITHUB_CALLBACK_URL=https://api.muxvo.com/auth/github/callback
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL=https://api.muxvo.com/auth/google/callback
          APP_SCHEME=muxvo
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM=noreply@muxvo.com
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          EOF

      - name: Ensure docker-compose .env
        run: |
          cat << EOF | ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_HOST }} "cat > /opt/muxvo-server/.env"
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          EOF

      - name: Validate env vars
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_HOST }} 'bash -s' << 'SCRIPT'
          for key in GITHUB_CLIENT_ID GITHUB_CLIENT_SECRET GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET DB_PASSWORD; do
            val=$(grep "^${key}=" /opt/muxvo-server/server/.env | cut -d= -f2-)
            if [ -z "$val" ]; then
              echo "FATAL: ${key} is empty in server/.env"
              exit 1
            fi
          done
          echo "All critical env vars verified."
          SCRIPT

      - name: Build and restart containers
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_HOST }} \
            "cd /opt/muxvo-server && docker compose -f docker/docker-compose.yml build && docker compose -f docker/docker-compose.yml up -d"

      - name: Run database migrations
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_HOST }} \
            "cd /opt/muxvo-server && docker compose -f docker/docker-compose.yml exec -T api npm run migrate:up"

      - name: Health check
        run: |
          sleep 5
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_HOST }} \
            "curl -f http://localhost:3000/health"
