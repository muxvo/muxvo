name: Deploy Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload code via rsync
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude .env \
            --exclude .git \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ root@${{ secrets.SERVER_HOST }}:/opt/muxvo-server/

      - name: Build and restart containers
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_HOST }} \
            "cd /opt/muxvo-server && docker compose build && docker compose up -d"

      - name: Run database migrations
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_HOST }} \
            "cd /opt/muxvo-server && docker compose exec -T api npm run migrate:up"

      - name: Health check
        run: |
          sleep 5
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_HOST }} \
            "curl -f http://localhost:3000/health"
