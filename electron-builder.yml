appId: com.muxvo.app
productName: Muxvo
directories:
  buildResources: build
  output: dist

publish:
  provider: github
  owner: muxvo
  repo: muxvo

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
        # - x64  # Intel Mac support: adds ~10min build time, enable when needed
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: "li rao (M7T6PJ8YJZ)"
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize:
    teamId: M7T6PJ8YJZ

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

files:
  - out/**/*
  - "!node_modules/**/*"
  - node_modules/node-pty/**/*
  - node_modules/@electron-toolkit/utils/**/*

extraResources: []

npmRebuild: true

protocols:
  - name: Muxvo
    schemes:
      - muxvo
