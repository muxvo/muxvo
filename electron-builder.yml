appId: com.muxvo.app
productName: Muxvo
directories:
  buildResources: build
  output: dist

publish:
  provider: github
  owner: muxvo
  repo: muxvo

mac:
  artifactName: '${productName}-${version}-${arch}.${ext}'
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

files:
  - out/**/*
  - "!node_modules/**/*"
  - node_modules/node-pty/**/*
  - node_modules/@electron-toolkit/utils/**/*

extraResources:
  - from: docs/muxvo-guide.md
    to: muxvo-guide.md
  - from: CHANGELOG.zh.md
    to: CHANGELOG.zh.md
  - from: CHANGELOG.en.md
    to: CHANGELOG.en.md

npmRebuild: true

protocols:
  - name: Muxvo
    schemes:
      - muxvo
