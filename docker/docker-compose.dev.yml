services:
  postgres:
    image: postgres:16-alpine
    container_name: muxvo-dev-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=muxvo_dev
      - POSTGRES_USER=muxvo
      - POSTGRES_PASSWORD=dev_password
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: muxvo-dev-redis
    ports:
      - "6379:6379"

volumes:
  pgdata_dev:
