services:
  postgres:
    image: postgres:16-alpine
    container_name: muxvo-dev-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=muxvo_dev
      - POSTGRES_USER=muxvo
      - POSTGRES_PASSWORD=${DB_PASSWORD:-dev_password}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: muxvo-dev-redis
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  pgdata_dev:
