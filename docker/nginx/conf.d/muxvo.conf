# Rate limit zones
limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;

# ============================================================
# HTTP -> HTTPS redirect (all domains)
# ============================================================
server {
    listen 80;
    server_name muxvo.com www.muxvo.com api.muxvo.com admin.muxvo.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# muxvo.com / www.muxvo.com - Main website (SPA)
# ============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name muxvo.com www.muxvo.com;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/muxvo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/muxvo.com/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    root /var/www/muxvo-web;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets cache (30 days)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Download path
    location /download/ {
        alias /var/www/muxvo-downloads/;
        autoindex off;
    }
}

# ============================================================
# api.muxvo.com - API reverse proxy
# ============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name api.muxvo.com;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/api.muxvo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.muxvo.com/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Auth endpoints - strict rate limit
    location ~ ^/api/v1/auth/ {
        limit_req zone=auth_strict burst=10 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API - standard rate limit
    location / {
        limit_req zone=api_general burst=60 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================
# admin.muxvo.com - Admin dashboard (SPA)
# ============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name admin.muxvo.com;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/admin.muxvo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.muxvo.com/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    root /var/www/muxvo-admin;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets cache (30 days)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
